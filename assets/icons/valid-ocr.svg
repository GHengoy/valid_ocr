<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e0f2fe"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e5e7eb"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  <rect x="5" y="5" width="246" height="246" rx="51" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="3"/>

  <!-- 카메라 -->
  <path d="M98 76 l13 -18 h34 l13 18 z" fill="url(#body)"/>
  <rect x="40" y="80" width="176" height="118" rx="22" fill="url(#body)"/>
  <rect x="170" y="96" width="26" height="12" rx="6" fill="#fbbf24"/>

  <!-- 렌즈 -->
  <circle cx="128" cy="142" r="46" fill="#0f172a"/>
  <circle cx="128" cy="142" r="37" fill="url(#lens)"/>
  <circle cx="128" cy="142" r="17" fill="#0f172a"/>
  <circle cx="115" cy="129" r="9" fill="#ffffff" fill-opacity="0.85"/>

  <!-- 검증(체크) 배지 -->
  <circle cx="196" cy="196" r="34" fill="#16a34a" stroke="#ffffff" stroke-width="7"/>
  <path d="M180 196 l11 12 l20 -24" fill="none" stroke="#ffffff" stroke-width="9"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
